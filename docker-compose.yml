services:

  collabora:
    build: .
    image: zotero-collabora:dev
    container_name: collabora
    ports:
      - "9980:9980"
    environment:
      # Trust the wopi service as a WOPI host (service name resolves inside Docker network)
      - aliasgroup1=http://wopi:8080
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:security.capabilities=false --o:security.seccomp=false --o:stop_on_config_change=false --o:logging.level=trace
    volumes:
      - ./scripts/zotero_fields.py:/opt/collaboraoffice/share/Scripts/python/zotero_fields.py:ro
      - ./scripts/zotero_export.py:/opt/collaboraoffice/share/Scripts/python/zotero_export.py:ro
    cap_add:
      - MKNOD
    depends_on:
      - wopi
    restart: unless-stopped

  wopi:
    image: python:3.12-slim
    container_name: wopi
    working_dir: /app
    command: >
      sh -c "pip install flask --quiet && python server.py"
    volumes:
      - ./wopi:/app
    ports:
      - "8080:8080"
    environment:
      # Internal: how the WOPI server reaches Collabora (Docker service name)
      - COLLABORA_INTERNAL_URL=http://collabora:9980
      # External: how the browser reaches Collabora
      - COLLABORA_BROWSER_URL=http://localhost:9980
      # How Collabora (inside Docker) reaches this WOPI server
      - WOPI_INTERNAL_URL=http://wopi:8080
    restart: unless-stopped
